name: AI-Agent-Check

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

   - name: Run AI Agent
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}  # 👈 이 줄이 꼭 있어야 합니다!
      run: |
        python agent.py 
