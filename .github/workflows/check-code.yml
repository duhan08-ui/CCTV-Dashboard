name: AI-Agent-Check

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Run AI Agent
      # ⚠️ 핵심: 'env:'는 'name:'과 세로 줄이 딱 맞아야 합니다.
      # ⚠️ 'GEMINI_API_KEY:'는 'env:'보다 두 칸 안으로 들어가야 합니다.
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python agent.py
