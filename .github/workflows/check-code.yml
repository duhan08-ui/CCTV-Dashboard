name: AI-Agent-Check

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Run AI Agent
      env:
        # 🔑 여기서 왼쪽 이름(GEMINI_API_KEY)이 파이썬 코드와 일치해야 합니다.
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python agent.py
