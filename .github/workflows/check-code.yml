name: AI-Agent-Check

# 실행 트리거 설정
on:
  push:
    branches: [ "main" ]  # 메인 브랜치에 코드가 올라올 때 자동 실행
  workflow_dispatch:      # [Run workflow] 버튼을 활성화함

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 가져오기
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 파이썬 환경 설정
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 3. AI 에이전트 실행 (가장 중요한 부분!)
      - name: Run AI Agent
        # 🔑 GitHub Secrets의 키를 파이썬 환경변수로 연결합니다.
        # 이 env 설정의 들여쓰기가 틀리면 키 전달이 안 됩니다.
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python agent.py
